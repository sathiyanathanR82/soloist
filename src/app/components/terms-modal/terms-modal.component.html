@if (!isStandalone) {
<div class="modal-overlay" (click)="closeModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>Terms and Conditions</h2>
      <button class="close-btn" (click)="closeModal()">✕</button>
    </div>

    <div class="modal-body">
      <div [innerHTML]="termsContent"></div>
    </div>

    <div class="modal-footer">
      <button class="btn-secondary" (click)="closeModal()">Cancel</button>
      <button class="btn-primary" (click)="agreeToTerms()">I Agree to Terms</button>
    </div>
  </div>
</div>
} @else {
<div class="terms-container">
  <div class="content-card">
    <header>
      <h1>Terms of Service</h1>
      <p class="last-updated">Last Updated: March 6, 2026</p>
    </header>

    <div class="terms-body">
      <div [innerHTML]="termsContent"></div>
    </div>

    <footer>
      <button (click)="goBack()" class="btn-back">Back to Login</button>
      <button (click)="agreeToTerms()" class="btn-agree">I Agree & Continue</button>
    </footer>
  </div>
</div>
}
