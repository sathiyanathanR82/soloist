<div class="login-container">
  <img src="assets/images/soloist_v.png" alt="Soloist" class="login-page-logo">
  <div class="login-header">
    <h1>Welcomes you</h1>
  </div>

  <div class="login-box">
    <h4 class="loginbox-header">Connect with your social account</h4>
    <div class="login-content">
      @if (errorMessage) {
      <div class="error-message">
        {{ errorMessage }}
      </div>
      }

      <div class="social-buttons">
        @for (provider of socialProviders; track provider) {
        <button [ngClass]="provider.className" class="social-btn" (click)="loginWithSocial(provider.name)"
          [disabled]="loadingProvider !== null" [style.--provider-color]="provider.color">
          <span class="icon" [innerHTML]="provider.icon"></span>
          @if (loadingProvider !== provider.name) {
          <span class="text">Continue with {{ provider.name }}</span>
          }
          @if (loadingProvider === provider.name) {
          <span class="text loading">Authenticating...</span>
          }
        </button>
        }
      </div>
    </div>

    <div class="login-footer">
      <p>By logging in, you agree to our <a href="/privacy-policy">Privacy Policy</a> and <a
          href="/terms-of-service">Terms of
          Service</a></p>
      <p style="margin-top: 10px;"><a href="/user-data-deletion" style="font-size: 11px; opacity: 0.7;">User Data
          Deletion Instructions</a></p>
    </div>
  </div>
</div>
